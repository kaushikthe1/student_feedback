version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edufeed-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edufeed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-feedback_db}
    volumes:
      - edufeed_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: edufeed-app
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-edufeed}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-feedback_db}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY}
    volumes:
      - edufeed_backups:/app/backups
    ports:
      - "3000:3000"

  # UNCOMMENT THIS BLOCK IF YOU DON'T HAVE AN EXISTING NGINX SETUP
  # nginx:
  #   image: nginx:alpine
  #   container_name: edufeed-nginx
  #   restart: always
  #   depends_on:
  #     - app
  #   volumes:
  #     - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #   ports:
  #     - "80:80"

volumes:
  edufeed_postgres_data:
  edufeed_backups:
